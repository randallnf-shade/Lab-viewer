<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dental Lab QC + Test Mode</title>
    <style>
        :root { --accent: #00d4ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        #container { width: 100vw; height: 52vh; background: radial-gradient(circle, #2c2c2c 0%, #121212 100%); }
        #ui { position: absolute; bottom: 0; width: 100%; background: var(--panel); padding: 15px; box-sizing: border-box; border-top: 1px solid #444; display: flex; flex-direction: column; gap: 8px; border-radius: 20px 20px 0 0; }
        .row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .btn { background: var(--accent); border: none; color: black; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; min-width: 120px; font-size: 13px; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; flex: 1; font-size: 11px; min-width: 90px; }
        .active { background: #ff4444 !important; border-color: #ffaaaa; }
        #feedback { position: absolute; top: 65px; left: 10px; background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 5px; border-left: 4px solid var(--accent); font-size: 11px; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div id="header">
    <span style="font-weight: bold; letter-spacing: 1px;">DENTAL CAD <span style="color:var(--accent)">PRO</span></span>
    <span id="dist-display" style="font-size: 12px; color: var(--accent);">QC Ready</span>
</div>

<div id="feedback">
    Mode: Standard View<br>
    <span id="measure-text">Tap 2 points to measure mm</span>
</div>

<div id="container"></div>

<div id="ui">
    <div class="row">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📂 LOAD SCAN</button>
        <button class="btn" onclick="generateTestTooth()" style="background:#555; color:white;">🦷 TEST MOLAR</button>
        <button class="btn" onclick="takeScreenshot()" style="background:#ff8c00">📸 CAPTURE</button>
    </div>
    
    <div class="row">
        <button id="thickBtn" class="tool-btn" onclick="toggleThickness()">⚠️ THICKNESS</button>
        <button id="pathBtn" class="tool-btn" onclick="lockPath()">👁️ INSERTION</button>
        <button id="sliceBtn" class="tool-btn" onclick="toggleSlice()">🔪 X-SECTION</button>
        <button class="tool-btn" onclick="clearAll()">🧹 RESET</button>
    </div>
    
    <input type="file" id="fileInput" accept=".stl" style="display:none">
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
