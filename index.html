<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental CAD Fix</title>
    <style>
        :root { --accent: #00d4ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* The 3D window is now strictly limited so it doesn't overlap buttons */
        #container { width: 100vw; height: 45vh; position: relative; z-index: 1; touch-action: none; }
        
        /* The UI is forced to the front */
        #ui { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            background: var(--panel); 
            padding: 15px; 
            box-sizing: border-box; 
            z-index: 100; /* High z-index ensures buttons are "on top" */
            border-top: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row { display: flex; gap: 8px; width: 100%; }
        button { 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            padding: 12px; 
            font-size: 11px; 
            flex: 1; 
            cursor: pointer;
            pointer-events: auto !important; /* Forces the button to accept taps */
        }
        
        .test-btn { background: #333; color: var(--accent); border: 1px solid var(--accent); }
        .load-btn { background: var(--accent); color: black; }
        .tool-btn { background: #444; color: white; }
        .edit-toggle-btn { background: #555; color: #ff8c00; border: 1px solid #ff8c00; width: 100%; }

        #editor-panel { 
            background: #252525; 
            padding: 10px; 
            border-radius: 8px; 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
        }
    </style>
</head>
<body>

<div id="container"></div>

<div id="ui">
    <button id="toggleEditBtn" class="edit-toggle-btn" onclick="toggleEditor()">🛠️ ENABLE EDITING</button>

    <div id="editor-panel">
        <button class="tool-btn" onclick="adjust('pos', 'x', 0.5)">X+</button>
        <button class="tool-btn" onclick="adjust('pos', 'y', 0.5)">Y+</button>
        <button class="tool-btn" onclick="adjust('pos', 'z', 0.5)">Z+</button>
        <button class="tool-btn" onclick="adjust('rot', 'x', 0.1)">RX+</button>
        <button class="tool-btn" onclick="adjust('rot', 'y', 0.1)">RY+</button>
        <button class="tool-btn" onclick="adjust('rot', 'z', 0.1)">RZ+</button>
    </div>

    <div class="row">
        <button class="test-btn" onclick="runTest(1)">🦷 TEST PREP</button>
        <button class="test-btn" onclick="runTest(2)">💎 TEST DESIGN</button>
    </div>
    
    <div class="row">
        <button class="load-btn" onclick="document.getElementById('f1').click()">📂 LOAD PREP</button>
        <button class="load-btn" onclick="document.getElementById('f2').click()">📂 LOAD DESIGN</button>
    </div>

    <div class="row">
        <button class="tool-btn" onclick="toggleSlice()">🔪 SLICE</button>
        <button class="tool-btn" onclick="takeShot()" style="background:#ff8c00; color:black">📸 SAVE QC</button>
    </div>
</div>

<input type="file" id="f1" accept=".stl" style="display:none" onchange="load(event, 1)">
<input type="file" id="f2" accept=".stl" style="display:none" onchange="load(event, 2)">

<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
