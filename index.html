<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dual-CAD + Transparency</title>
    <style>
        :root { --accent: #00d4ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        #container { width: 100vw; height: 45vh; background: radial-gradient(circle, #2c2c2c 0%, #121212 100%); }
        #ui { position: absolute; bottom: 0; width: 100%; background: var(--panel); padding: 12px; box-sizing: border-box; border-top: 1px solid #444; display: flex; flex-direction: column; gap: 8px; border-radius: 20px 20px 0 0; }
        .row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .btn { background: var(--accent); border: none; color: black; padding: 10px; border-radius: 6px; font-weight: bold; flex: 1; min-width: 125px; font-size: 11px; }
        .test-btn { background: #333; color: #aaa; border: 1px solid #555; padding: 10px; border-radius: 6px; flex: 1; min-width: 100px; font-size: 10px; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 6px; flex: 1; font-size: 11px; min-width: 85px; }
        .slider-box { background: #2a2a2a; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex-grow: 1; accent-color: var(--accent); }
        .active { background: #ff4444 !important; }
        #feedback { position: absolute; top: 65px; left: 10px; background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 5px; border-left: 4px solid var(--accent); font-size: 11px; z-index: 5; }
    </style>
</head>
<body>

<div id="header">
    <span style="font-weight: bold;">CAD <span style="color:var(--accent)">QC STUDIO</span></span>
    <span id="dist-display" style="color: var(--accent);">0.00mm</span>
</div>

<div id="feedback">
    <div id="l1-s" style="color:#eee">● Prep: Empty</div>
    <div id="l2-s" style="color:#00d4ff">● Design: Empty</div>
</div>

<div id="container"></div>

<div id="ui">
    <div class="row">
        <button class="test-btn" onclick="genTest('prep')">🦷 TEST PREP</button>
        <button class="test-btn" onclick="genTest('design')">💎 TEST CROWN</button>
        <button class="test-btn" onclick="genTest('molar')">🦷 FULL MOLAR</button>
    </div>
    
    <div class="slider-box">
        <span style="font-size:10px; color:var(--accent)">OPACITY</span>
        <input type="range" id="opacitySlider" min="0" max="100" value="70">
    </div>

    <div class="row">
        <button class="btn" onclick="document.getElementById('file1').click()">📂 LOAD PREP</button>
        <button class="btn" onclick="document.getElementById('file2').click()">📂 LOAD DESIGN</button>
    </div>
    
    <div class="row">
        <button id="sliceBtn" class="tool-btn" onclick="toggleSlice()">🔪 X-SECTION</button>
        <button id="pathBtn" class="tool-btn" onclick="lockPath()">👁️ INSERTION</button>
        <button class="tool-btn" onclick="clearAll()" style="color:#ff4444">Clear</button>
        <button class="tool-btn" onclick="takeScreenshot()" style="background:#ff8c00; color:black;">📸 Capture</button>
    </div>
    
    <input type="file" id="file1" accept=".stl" style="display:none">
    <input type="file" id="file2" accept=".stl" style="display:none">
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, mesh1, mesh2;
    let points = [], markers = [];
    let isSlicing = false;
    let clippingPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / (window.innerHeight * 0.45), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
        renderer.localClippingEnabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x808080));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 15, 30);
        
        renderer.domElement.addEventListener('pointerdown', handleTap);
        animate();
    }

    function genTest(type) {
        if (type === 'prep') {
            const geom = new THREE.CylinderGeometry(6, 8, 10, 32);
            if (mesh1) scene.remove(mesh1);
            mesh1 = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide }));
            scene.add(mesh1);
            document.getElementById('l1-s').innerText = "● Prep: Loaded";
        } else if (type === 'design') {
            const geom = new THREE.CylinderGeometry(6.5, 8.5, 11, 32, 1, true);
            if (mesh2) scene.remove(mesh2);
            mesh2 = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ color: 0x00d4ff, side: THREE.DoubleSide, transparent: true, opacity: 0.7 }));
            scene.add(mesh2);
            document.getElementById('l2-s').innerText = "● Design: Loaded";
        } else if (type === 'molar') {
            const geom = new THREE.CylinderGeometry(7, 9, 12, 32);
            if (mesh1) scene.remove(mesh1);
            mesh1 = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            scene.add(mesh1);
            document.getElementById('l1-s').innerText = "● Molar: Loaded";
        }
    }

    document.getElementById('opacitySlider').addEventListener('input', function(e) {
        if (mesh2) {
            mesh2.material.opacity = e.target.value / 100;
        }
    });

    function loadSTL(event, layer) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const geom = new THREE.STLLoader().parse(e.target.result);
            const mat = new THREE.MeshStandardMaterial({ 
                color: layer === 1 ? 0xeeeeee : 0x00d4ff, 
                side: THREE.DoubleSide,
                transparent: layer === 2,
                opacity: layer === 2 ? 0.7 : 1
            });
            if (layer === 1) {
                if (mesh1) scene.remove(mesh1);
                mesh1 = new THREE.Mesh(geom, mat);
                centerMesh(mesh1); scene.add(mesh1);
                document.getElementById('l1-s').innerText = "● Prep: Loaded";
            } else {
                if (mesh2) scene.remove(mesh2);
                mesh2 = new THREE.Mesh(geom, mat);
                centerMesh(mesh2); scene.add(mesh2);
                document.getElementById('l2-s').innerText = "● Design: Loaded";
            }
        };
        reader.readAsArrayBuffer(event.target.files[0]);
    }

    function centerMesh(m) {
        m.geometry.computeBoundingBox();
        const center = new THREE.Vector3();
        m.geometry.boundingBox.getCenter(center);
        m.position.sub(center);
    }

    function handleTap(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2((e.clientX / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(scene.children);
        if (hits.length > 0) {
            const pos = hits[0].point;
            points.push(pos);
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshBasicMaterial({color: 0xff4444}));
            dot.position.copy(pos); scene.add(dot); markers.push(dot);
            if (points.length === 2) {
                document.getElementById('dist-display').innerText = points[0].distanceTo(points[1]).toFixed(2) + "mm";
                points = [];
            }
        }
    }

    function toggleSlice() {
        isSlicing = !isSlicing;
        [mesh1, mesh2].forEach(m => { if(m) m.material.clippingPlanes = isSlicing ? [clippingPlane] : null; });
        document.getElementById('sliceBtn').classList.toggle('active');
    }

    function lockPath() {
        const btn = document.getElementById('pathBtn');
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) { camera.position.set(0, 40, 0); controls.enableRotate = false; }
        else { controls.enableRotate = true; }
    }

    function clearAll() {
        if(mesh1) scene.remove(mesh1); if(mesh2) scene.remove(mesh2);
