<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental CAD Designer Pro</title>
    <style>
        :root { --accent: #00d4ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #header { background: var(--panel); padding: 12px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; z-index: 101; position: relative; }
        #container { width: 100vw; height: 45vh; position: relative; z-index: 1; }
        #ui { position: absolute; bottom: 0; width: 100%; background: var(--panel); padding: 15px; box-sizing: border-box; z-index: 100; border-top: 2px solid var(--accent); display: flex; flex-direction: column; gap: 8px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .row { display: flex; gap: 8px; width: 100%; }
        button { border: none; border-radius: 8px; font-weight: bold; padding: 14px; font-size: 11px; flex: 1; cursor: pointer; transition: background 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); background: #555 !important; }
        .test-btn { background: #333; color: var(--accent); border: 1px solid var(--accent); }
        .load-btn { background: var(--accent); color: black; }
        .tool-btn { background: #444; color: white; }
        .edit-toggle-btn { background: #555; color: #ff8c00; border: 1px solid #ff8c00; width: 100%; }
        #editor-panel { background: #252525; padding: 10px; border-radius: 8px; display: none; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 5px; }
        .label { grid-column: span 3; font-size: 9px; color: #ff8c00; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <span style="font-weight:bold">CAD <span style="color:var(--accent)">DESIGNER</span></span>
    <span id="mm-display" style="color:var(--accent); font-weight:bold;">0.00mm</span>
</div>

<div id="container"></div>

<div id="ui">
    <button id="toggleEditBtn" class="edit-toggle-btn" onclick="toggleEditor()">🛠️ ENABLE EDITING</button>

    <div id="editor-panel">
        <div class="label">NUDGE / TILT</div>
        <button class="tool-btn" onclick="adjust('pos', 'x', 0.5)">X+</button>
        <button class="tool-btn" onclick="adjust('pos', 'y', 0.5)">Y+</button>
        <button class="tool-btn" onclick="adjust('pos', 'z', 0.5)">Z+</button>
        <button class="tool-btn" onclick="adjust('rot', 'x', 0.2)">RX+</button>
        <button class="tool-btn" onclick="adjust('rot', 'y', 0.2)">RY+</button>
        <button class="tool-btn" onclick="adjust('rot', 'z', 0.2)">RZ+</button>
    </div>

    <div class="row">
        <button class="test-btn" onclick="runTest(1)">🦷 TEST PREP</button>
        <button class="test-btn" onclick="runTest(2)">💎 TEST DESIGN</button>
    </div>
    
    <div class="row">
        <button class="load-btn" onclick="document.getElementById('f1').click()">📂 LOAD PREP</button>
        <button class="load-btn" onclick="document.getElementById('f2').click()">📂 LOAD DESIGN</button>
    </div>

    <div class="row">
        <button class="tool-btn" onclick="toggleSlice()">🔪 SLICE</button>
        <button class="tool-btn" onclick="takeShot()" style="background:#ff8c00; color:black">📸 SAVE QC</button>
    </div>
</div>

<input type="file" id="f1" accept=".stl" style="display:none" onchange="loadSTL(event, 1)">
<input type="file" id="f2" accept=".stl" style="display:none" onchange="loadSTL(event, 2)">

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, m1, m2;
    let slicing = false, editorVisible = false;
    let clipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / (window.innerHeight * 0.45), 0.1, 1000);
        camera.position.set(0, 20, 30);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
        renderer.setClearColor(0x121212);
        renderer.localClippingEnabled = true;
        document.getElementById('container').appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        let light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(10, 20, 10);
        scene.add(light);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        animate();
    }

    function runTest(type) {
        if (type === 1) {
            if (m1) scene.remove(m1);
            const geo = new THREE.CylinderGeometry(6, 8, 10, 32);
            m1 = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            scene.add(m1);
        } else {
            if (m2) scene.remove(m2);
            const geo = new THREE.CylinderGeometry(6.5, 8.5, 11, 32);
            m2 = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.6 }));
            scene.add(m2);
        }
        // Focus camera on model
        camera.position.set(0, 15, 25);
