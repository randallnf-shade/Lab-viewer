<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental CAD Pro: No-Conflict</title>
    <style>
        :root { --accent: #00d4ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Fixed Viewport for 3D */
        #container { width: 100vw; height: 40vh; position: relative; background: #000; }
        
        /* UI Panel with clear separation */
        #ui { 
            width: 100vw; 
            height: 60vh; 
            background: var(--panel); 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            overflow-y: auto; /* Allow scrolling if screen is small */
        }

        .section-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: -5px; }
        .row { display: flex; gap: 10px; width: 100%; }
        
        button { 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            padding: 16px; /* Larger tap target for fingers */
            font-size: 12px; 
            flex: 1; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .test-btn { background: #333; color: var(--accent); border: 2px solid var(--accent); }
        .load-btn { background: var(--accent); color: black; }
        .tool-btn { background: #444; color: white; }
        .edit-toggle-btn { background: #ff8c00; color: black; width: 100%; }

        #editor-panel { 
            background: #252525; 
            padding: 12px; 
            border-radius: 10px; 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            border: 1px dashed #ff8c00;
        }
    </style>
</head>
<body>

<div id="container"></div>

<div id="ui">
    <span class="section-label">1. Quick Test</span>
    <div class="row">
        <button class="test-btn" onclick="runTest(1)">🦷 PREP TEST</button>
        <button class="test-btn" onclick="runTest(2)">💎 DESIGN TEST</button>
    </div>

    <span class="section-label">2. File Management</span>
    <div class="row">
        <button class="load-btn" onclick="document.getElementById('f1').click()">📂 LOAD PREP</button>
        <button class="load-btn" onclick="document.getElementById('f2').click()">📂 LOAD DESIGN</button>
    </div>

    <span class="section-label">3. QC Tools</span>
    <div class="row">
        <button class="tool-btn" onclick="toggleSlice()">🔪 X-SECTION</button>
        <button class="tool-btn" onclick="takeShot()" style="background:#555">📸 CAPTURE</button>
    </div>

    <span class="section-label">4. Design Editor</span>
    <button id="toggleEditBtn" class="edit-toggle-btn" onclick="toggleEditor()">🛠️ SHOW EDITING TOOLS</button>

    <div id="editor-panel">
        <button class="tool-btn" onclick="adjust('pos', 'x', 0.5)">X+</button>
        <button class="tool-btn" onclick="adjust('pos', 'y', 0.5)">Y+</button>
        <button class="tool-btn" onclick="adjust('pos', 'z', 0.5)">Z+</button>
        <button class="tool-btn" onclick="adjust('rot', 'x', 0.2)">RX+</button>
        <button class="tool-btn" onclick="adjust('rot', 'y', 0.2)">RY+</button>
        <button class="tool-btn" onclick="adjust('rot', 'z', 0.2)">RZ+</button>
    </div>
</div>

<input type="file" id="f1" accept=".stl" style="display:none" onchange="loadSTL(event, 1)">
<input type="file" id="f2" accept=".stl" style="display:none" onchange="loadSTL(event, 2)">

<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
