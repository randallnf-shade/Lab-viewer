<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental CAD Pro: Safe Engine</title>
    <style>
        :root { --accent: #00d4ff; --danger: #ff4444; --panel: #1e1e1e; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: none; }
        
        #header { height: 50px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); }
        #container { width: 100vw; height: 45vh; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); position: relative; }
        
        #ui-layer { height: 55vh; background: var(--panel); padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        
        .control-group { background: #2a2a2a; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #333; }
        .group-label { font-size: 10px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .row { display: flex; gap: 8px; }
        button { border: none; border-radius: 8px; font-weight: bold; padding: 14px; font-size: 11px; flex: 1; cursor: pointer; color: white; background: #3d3d3d; transition: all 0.2s; -webkit-tap-highlight-color: transparent; text-transform: uppercase; }
        button:active { transform: scale(0.96); filter: brightness(1.3); }
        
        .primary { background: var(--accent); color: black; }
        .secondary { border: 1px solid var(--accent); color: var(--accent); background: #222; }
        .warning { color: #ff8c00; border: 1px solid #ff8c00; background: transparent; }

        #edit-panel { display: none; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 5px; }
        .stat-badge { font-size: 12px; background: #000; padding: 4px 10px; border-radius: 20px; color: var(--accent); border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: 800; font-size: 18px;">PRO <span style="color:var(--accent)">CAD</span></div>
    <div id="dist-out" class="stat-badge">READY</div>
</div>

<div id="container"></div>

<div id="ui-layer">
    <div class="control-group">
        <div class="group-label">Virtual Test Models</div>
        <div class="row">
            <button class="secondary" onclick="generateProMolar(1)">🦷 TEST PREP</button>
            <button class="secondary" onclick="generateProMolar(2)">💎 TEST CROWN</button>
        </div>
    </div>

    <div class="control-group">
        <div class="group-label">Patient STL Imports</div>
        <div class="row">
            <button class="primary" onclick="document.getElementById('f1').click()">📂 LOAD PREP</button>
            <button class="primary" onclick="document.getElementById('f2').click()">📂 LOAD DESIGN</button>
        </div>
    </div>

    <div class="control-group">
        <div class="group-label">Visualization & QC</div>
        <div class="row">
            <button onclick="toggleClipping()">🔪 X-SECTION</button>
            <button onclick="resetViewport()">🔄 CENTER VIEW</button>
            <button onclick="clearScene()" style="color:var(--danger)">🧹 CLEAR</button>
        </div>
    </div>

    <div class="control-group">
        <div class="group-label">Transformation Engine</div>
        <button class="warning" onclick="toggleEditPanel()">🛠️ MODIFY RESTORATION</button>
        <div id="edit-panel">
            <button onclick="transform('pos','x',0.5)">X+</button>
            <button onclick="transform('pos','y',0.5)">Y+</button>
            <button onclick="transform('pos','z',0.5)">Z+</button>
            <button onclick="transform('rot','x',0.1)">RX+</button>
            <button onclick="transform('rot','y',0.1)">RY+</button>
            <button onclick="transform('scale','',1.05)">S+</button>
        </div>
    </div>
</div>

<input type="file" id="f1" accept=".stl" style="display:none" onchange="importSTL(event, 1)">
<input type="file" id="f2" accept=".stl" style="display:none" onchange="importSTL(event, 2)">

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, scan1, scan2;
    let isClipping = false;
    const clipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / (window.innerHeight * 0.45), 0.1, 1000);
        camera.position.set(30, 20, 30);

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.45);
        renderer.localClippingEnabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const direct = new THREE.DirectionalLight(0xffffff, 0.8);
        direct.position.set(10, 20, 10);
        scene.add(direct);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        renderLoop();
    }

    function generateProMolar(type) {
        let geo;
        
        // Using highly stable CylinderGeometry, but tapering it to mimic a dental preparation
        // format: CylinderGeometry(radiusTop, radiusBottom, height, radialSegments)
        if (type === 1) { 
            // The Prep: Narrower at top, wider at margin
            geo = new THREE.CylinderGeometry(4.5, 5.5, 10, 64);
        } else { 
            // The Crown: Slightly larger to fit over the prep, with a similar taper
            geo = new THREE.CylinderGeometry(5.2, 6.2, 11, 64);
        }

        const mat = new THREE.MeshStandardMaterial({ 
            color: type === 1 ? 0xeaeaea : 0x00d4ff, 
            transparent: type === 2, 
            opacity: 0.65,
            roughness: 0.4,
            metalness: 0.2,
            side: THREE.DoubleSide
        });

        const mesh = new THREE.Mesh(geo, mat);
        
        // Offset the crown slightly upward so it sits perfectly over the prep like a real design
        if (type === 2) mesh.position.y += 0.5;

        if (type === 1) { if(scan1) scene.remove(scan1); scan1 = mesh; } 
        else { if(scan2) scene.remove(scan2); scan2 = mesh; }
        
        scene.add(mesh);
        document.getElementById('dist-out').innerText = type === 1 ? "PREP LOADED" : "CROWN LOADED";
        resetViewport();
    }

    function importSTL(e, layer) {
        const file = e.target.files[0];
        const reader = new FileReader();
        document.getElementById('dist-out').innerText = "LOADING...";
        
        reader.onload = (ev) => {
            const geo = new THREE.STLLoader().parse(ev.target.result);
            const mat = new THREE.MeshStandardMaterial({ 
                color: layer === 1 ? 0xf0f0f0 : 0x00d4ff, 
                transparent: layer === 2, 
                opacity: 0.7 
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            geo.computeBoundingBox();
            const center = new THREE.Vector3();
            geo.boundingBox.getCenter(center);
            mesh.position.sub(center);

            if (layer === 1) { if(scan1) scene.remove(scan1); scan1 = mesh; }
            else { if(scan2) scene.remove(scan2); scan2 = mesh; }
            scene.add(mesh);
            
            document.getElementById('dist-out').innerText = layer === 1 ? "PREP STL OK" : "DESIGN STL OK";
            resetViewport();
        };
        reader.readAsArrayBuffer(file);
    }

    function transform(mode, axis, val) {
        if(!scan2) return;
        if(mode === 'pos') scan2.position[axis] += val;
        if(mode === 'rot') scan2.rotation[axis] += val;
        if(mode === 'scale') scan2.scale.multiplyScalar(val);
    }

    function toggleClipping() {
        isClipping = !isClipping;
        [scan1, scan2].forEach(m => { if(m) m.material.clippingPlanes = isClipping ? [clipPlane] : null; });
    }

    function toggleEditPanel() {
        const p = document.getElementById('edit-panel');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    }

    function resetViewport() {
        camera.position.set(20, 20, 20);
        controls.target.set(0, 0, 0);
        controls.update();
    }

    function clearScene() {
        if(scan1) scene.remove(scan1); if(scan2) scene.remove(scan2);
        scan1 = null; scan2 = null;
        document.getElementById('dist-out').innerText = "CLEARED";
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
