<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dual-CAD Fix</title>
    <style>
        :root { --accent: #00d4ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #header { background: var(--panel); padding: 12px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; }
        #container { width: 100vw; height: 50vh; }
        #ui { position: absolute; bottom: 0; width: 100%; background: var(--panel); padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; border-radius: 20px 20px 0 0; }
        .row { display: flex; gap: 8px; }
        button { border: none; border-radius: 8px; font-weight: bold; padding: 12px; font-size: 12px; transition: transform 0.1s; }
        button:active { transform: scale(0.95); background: #555; }
        .test-btn { background: #333; color: var(--accent); border: 1px solid var(--accent); flex: 1; }
        .load-btn { background: var(--accent); color: black; flex: 1; }
        .tool-btn { background: #444; color: white; flex: 1; }
        #status-box { position: absolute; top: 60px; left: 10px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px; font-size: 11px; pointer-events: none; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div id="header">
    <span style="font-weight:bold">CAD <span style="color:var(--accent)">DUAL-CHECK</span></span>
    <span id="mm-display" style="color:var(--accent)">0.00mm</span>
</div>

<div id="status-box">
    <div id="s1">Scan 1: -</div>
    <div id="s2">Scan 2: -</div>
</div>

<div id="container"></div>

<div id="ui">
    <div class="row">
        <button class="test-btn" onclick="runTest(1)">🦷 TEST PREP</button>
        <button class="test-btn" onclick="runTest(2)">💎 TEST DESIGN</button>
    </div>
    <div class="row">
        <button class="load-btn" onclick="document.getElementById('f1').click()">📂 LOAD 1</button>
        <button class="load-btn" onclick="document.getElementById('f2').click()">📂 LOAD 2</button>
    </div>
    <div class="row">
        <button class="tool-btn" onclick="toggleSlice()">🔪 SLICE</button>
        <button class="tool-btn" onclick="clearScene()" style="color:#ff4444">🧹 RESET</button>
        <button class="tool-btn" onclick="takeShot()" style="background:#ff8c00; color:black">📸 CAPTURE</button>
    </div>
    <input type="file" id="f1" accept=".stl" style="display:none" onchange="load(event, 1)">
    <input type="file" id="f2" accept=".stl" style="display:none" onchange="load(event, 2)">
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, m1, m2;
    let pts = [], marks = [];
    let slicing = false;
    let clip = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / (window.innerHeight * 0.5), 0.1, 1000);
        camera.position.set(0, 15, 30);

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.5);
        renderer.localClippingEnabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        let sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        renderer.domElement.addEventListener('pointerdown', tap);
        loop();
    }

    function runTest(layer) {
        if (layer === 1) {
            if (m1) scene.remove(m1);
            let g = new THREE.CylinderGeometry(6, 8, 10, 32);
            m1 = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            scene.add(m1);
            document.getElementById('s1').innerText = "Scan 1: Loaded";
        } else {
            if (m2) scene.remove(m2);
            let g = new THREE.CylinderGeometry(7, 9, 12, 32);
            // Design is blue and slightly transparent
            m2 = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.6 }));
            scene.add(m2);
            document.getElementById('s2').innerText = "Scan 2: Loaded";
        }
    }

    function load(e, layer) {
        let r = new FileReader();
        r.onload = (ev) => {
            let g = new THREE.STLLoader().parse(ev.target.result);
            let m = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ 
                color: layer === 1 ? 0xeeeeee : 0x00d4ff,
                transparent: layer === 2,
                opacity: 0.7
            }));
            g.computeBoundingBox();
            let c = new THREE.Vector3();
            g.boundingBox.getCenter(c);
            m.position.sub(c);
            if (layer === 1) { if(m1) scene.remove(m1); m1 = m; document.getElementById('s1').innerText = "Scan 1: Loaded"; }
            else { if(m2) scene.remove(m2); m2 = m; document.getElementById('s2').innerText = "Scan 2: Loaded"; }
            scene.add(m);
        };
        r.readAsArrayBuffer(e.target.files[0]);
    }

    function tap(e) {
        let rect = renderer.domElement.getBoundingClientRect();
        let mouse = new THREE.Vector2((e.clientX / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        let ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        let hits = ray.intersectObjects(scene.children);
        if (hits.length > 0) {
            let p = hits[0].point;
            pts.push(p);
            let dot = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xff0000}));
            dot.position.copy(p); scene.add(dot); marks.push(dot);
            if (pts.length === 2) {
                document.getElementById('mm-display').innerText = pts[0].distanceTo(pts[1]).toFixed(2) + "mm";
                pts = [];
            }
        }
    }

    function toggleSlice() {
        slicing = !slicing;
        if(m1) m1.material.clippingPlanes = slicing ? [clip] : null;
        if(m2) m2.material.clippingPlanes = slicing ? [clip] : null;
    }

    function clearScene() {
        if(m1) scene.remove(m1); if(m2) scene.remove(m2);
        marks.forEach(d => scene.remove(d)); marks = []; pts = [];
        document.getElementById('s1').innerText = "Scan 1: -";
        document.getElementById('s2').innerText = "Scan 2: -";
        document.getElementById('mm-display').innerText = "0.00mm";
    }

    function takeShot() {
        let l = document.createElement('a');
        l.download = 'DentalQC.png';
        l.href = renderer.domElement.toDataURL();
        l.click();
    }

    function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
