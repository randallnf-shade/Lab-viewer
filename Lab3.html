<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Molar CAD</title>
    <style>
        :root { --accent: #00d4ff; --bg: #000000; --panel: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #container { width: 100vw; height: 45vh; background: radial-gradient(circle, #222 0%, #000 100%); }
        #ui { height: 55vh; background: var(--panel); padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; border-top: 2px solid var(--accent); }
        .row { display: flex; gap: 10px; }
        button { border: none; border-radius: 12px; font-weight: bold; padding: 18px; font-size: 12px; flex: 1; cursor: pointer; transition: 0.2s; }
        button:active { filter: brightness(1.5); transform: scale(0.98); }
        .test-btn { background: #333; color: var(--accent); border: 2px solid var(--accent); }
        .load-btn { background: var(--accent); color: black; }
        .tool-btn { background: #444; color: white; }
        .edit-toggle { background: #ff8c00; color: black; width: 100%; }
        #editor { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #222; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="container"></div>

<div id="ui">
    <div style="font-size: 10px; color: var(--accent); text-align: center; font-weight: bold;">STEP 1: GENERATE REALISTIC TEST MODELS</div>
    <div class="row">
        <button class="test-btn" onclick="genMolar(1)">🦷 TEST PREP</button>
        <button class="test-btn" onclick="genMolar(2)">💎 TEST CROWN</button>
    </div>

    <div style="font-size: 10px; color: #888; text-align: center; margin-top: 5px;">STEP 2: LOAD OR MODIFY</div>
    <div class="row">
        <button class="load-btn" onclick="document.getElementById('f1').click()">📂 LOAD PREP</button>
        <button class="load-btn" onclick="document.getElementById('f2').click()">📂 LOAD DESIGN</button>
    </div>

    <div class="row">
        <button class="tool-btn" onclick="toggleSlice()">🔪 X-SECTION</button>
        <button class="tool-btn" onclick="resetCam()">🔄 RESET VIEW</button>
    </div>

    <button class="edit-toggle" onclick="toggleEditor()">🛠️ TRANSFORM DESIGN</button>
    <div id="editor">
        <button class="tool-btn" onclick="adj('pos','x',1)">X+</button>
        <button class="tool-btn" onclick="adj('pos','y',1)">Y+</button>
        <button class="tool-btn" onclick="adj('pos','z',1)">Z+</button>
        <button class="tool-btn" onclick="adj('rot','x',0.2)">Tilt X</button>
        <button class="tool-btn" onclick="adj('rot','y',0.2)">Tilt Y</button>
        <button class="tool-btn" onclick="adj('scale','',1.1)">Grow</button>
    </div>
</div>

<input type="file" id="f1" accept=".stl" style="display:none" onchange="handleFile(event, 1)">
